<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Survival</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="authPanel">
        <h2>🌲 Survival</h2>
        <div id="langSelect">
            <button class="lang-btn" data-lang="ru">🇷🇺 Русский</button>
            <button class="lang-btn" data-lang="en">🇬🇧 English</button>
        </div>
        <input type="text" id="playerName" placeholder="Имя персонажа / Character name">
        <input type="text" id="houseName" placeholder="Имя дома / House name">
        <button id="authBtn">Начать игру / Start</button>
    </div>
    <div id="gamePanel" style="display:none;">
        <canvas id="gameCanvas" width="1000" height="250"></canvas>
        <div id="infoBar">
            <span>📍 <span id="locationName">---</span></span>
            <span>🌞 <span id="timeOfDay">day</span></span>
            <span>🍖 <span id="hungerLabel">Голод</span>: <span id="hunger">0</span></span>
            <span>💧 <span id="thirstLabel">Жажда</span>: <span id="thirst">0</span></span>
            <button id="langGameBtn" class="small-btn">🌐 Язык/Lang</button>
        </div>
        <div id="inventoryPanel">
            <h3 id="inventoryTitle">📦 Инвентарь</h3>
            <ul id="invList"></ul>
        </div>
        <div id="craftPanel">
            <h3 id="craftTitle">🔨 Крафт</h3>
            <p id="craftHint">Кликни на тайл, затем на кнопку</p>
            <button data-craft="campfire" id="craftCampfire">🔥 Костёр (5 дерева, 1 палка)</button>
            <button data-craft="chest" id="craftChest">📦 Ящик (10 дерева)</button>
            <button data-craft="hut" id="craftHut">🏠 Шалаш (20 дерева, 10 листьев)</button>
            <button data-craft="bridge_wood" id="craftBridge">🌉 Деревянный мост (20 дерева, на воду)</button>
            <div id="craftStatus"></div>
        </div>
        <div id="poisonPanel">
            <h3 id="poisonTitle">🧪 Отравление дерева</h3>
            <p id="poisonHint">Если есть ядовитый отвар, кликни на дерево, затем на кнопку</p>
            <button id="poisonBtn">☠️ Отравить дерево</button>
        </div>
    </div>
    <div id="collectMenu" style="display:none;">
        <h3 id="collectTitle"></h3>
        <div id="collectButtons"></div>
    </div>
    <div id="socialMenu" style="display:none;">
        <h3 id="socialTitle"></h3>
        <div id="socialButtons"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
